<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADCA - Advanced Diploma in Computer Applications</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --glow-color: #ff0055;
            --glow-secondary: #ff7700;
            --bg-color: #050205;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            /* Prevent scroll for cinematic feel */
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Cinematic intro overlay */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOutIntro 4s forwards;
            animation-delay: 2s;
            pointer-events: none;
        }

        .intro-text {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 15px;
            color: #fff;
            opacity: 0;
            text-transform: uppercase;
            text-align: center;
            animation: fadeInOutText 3.5s forwards;
            padding: 0 20px;
        }

        @keyframes fadeOutIntro {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        @keyframes fadeInOutText {
            0% {
                opacity: 0;
                transform: scale(0.9);
                filter: blur(10px);
            }

            30% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0px);
            }

            70% {
                opacity: 1;
                transform: scale(1.05);
                filter: blur(0px);
            }

            100% {
                opacity: 0;
                transform: scale(1.1);
                filter: blur(10px);
            }
        }

        /* Cinematic Bars */
        .cinema-bar {
            position: fixed;
            left: 0;
            width: 100vw;
            height: 8vh;
            background: #000;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
        }

        .cinema-bar.top {
            top: 0;
        }

        .cinema-bar.bottom {
            bottom: 0;
        }

        /* Particles */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            top: 0;
            left: 0;
            background: radial-gradient(circle at center, #190B12 0%, #000000 100%);
        }

        .ambient-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 0, 85, 0.08) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        .header {
            position: absolute;
            top: 12vh;
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 4.5s;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 8px;
            background: linear-gradient(180deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .header p {
            margin-top: 10px;
            font-size: 1.1rem;
            color: #aaa;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* 3D Scene */
        .scene {
            width: 100vw;
            height: 100vh;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 4.5s;
            transition: transform 0.5s ease-out;
        }

        .carousel {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCarousel 45s infinite linear;
        }

        .carousel:hover {
            animation-play-state: paused;
        }

        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            margin-left: -130px;
            margin-top: -150px;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* 10 cards circularly (36 degrees apart) */
        .card:nth-child(1) {
            transform: rotateY(0deg) translateZ(680px);
        }

        .card:nth-child(2) {
            transform: rotateY(36deg) translateZ(680px);
        }

        .card:nth-child(3) {
            transform: rotateY(72deg) translateZ(680px);
        }

        .card:nth-child(4) {
            transform: rotateY(108deg) translateZ(680px);
        }

        .card:nth-child(5) {
            transform: rotateY(144deg) translateZ(680px);
        }

        .card:nth-child(6) {
            transform: rotateY(180deg) translateZ(680px);
        }

        .card:nth-child(7) {
            transform: rotateY(216deg) translateZ(680px);
        }

        .card:nth-child(8) {
            transform: rotateY(252deg) translateZ(680px);
        }

        .card:nth-child(9) {
            transform: rotateY(288deg) translateZ(680px);
        }

        .card:nth-child(10) {
            transform: rotateY(324deg) translateZ(680px);
        }

        .card-inner {
            width: 100%;
            height: 100%;
            /* Cinematic Glassmorphism */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem 1.5rem;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 0px var(--glow-color);
        }

        .card-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-20deg);
            transition: 0.8s;
        }

        .card:hover .card-inner::before {
            left: 150%;
        }

        .card:hover .card-inner {
            transform: scale(1.15) translateY(-20px);
            border-color: rgba(255, 0, 85, 0.6);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.9),
                0 0 50px rgba(255, 0, 85, 0.3),
                inset 0 0 20px rgba(255, 0, 85, 0.15);
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 10%;
            width: 80%;
            height: 20px;
            background: radial-gradient(ellipse, rgba(0, 0, 0, 0.8) 0%, transparent 70%);
            filter: blur(5px);
            transition: 0.6s;
        }

        .card:hover::after {
            bottom: -50px;
            width: 100%;
            left: 0;
            background: radial-gradient(ellipse, rgba(255, 0, 85, 0.4) 0%, transparent 70%);
        }

        .number {
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            color: rgba(255, 255, 255, 0.02);
            position: absolute;
            top: -20px;
            right: 0px;
            line-height: 1;
            transition: 0.5s;
            z-index: 0;
            pointer-events: none;
        }

        .card:hover .number {
            color: rgba(255, 0, 85, 0.1);
            transform: scale(1.1) translateX(-10px);
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            transition: 0.5s;
            z-index: 1;
        }

        .card:hover .icon {
            transform: scale(1.2) translateY(-10px);
            filter: drop-shadow(0 0 30px rgba(255, 0, 85, 0.9));
        }

        h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            transition: 0.5s;
            z-index: 1;
        }

        .card:hover h3 {
            color: #ff0055;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
        }

        p {
            font-size: 0.95rem;
            color: #aaa;
            line-height: 1.6;
            font-weight: 300;
            z-index: 1;
            transition: 0.5s;
            padding: 0 10px;
        }

        .card:hover p {
            color: #fff;
        }

        @keyframes rotateCarousel {
            0% {
                transform: rotateY(0deg) rotateX(2deg);
            }

            100% {
                transform: rotateY(360deg) rotateX(2deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Responsive */
        @media(max-width: 1400px) {
            .card:nth-child(1) {
                transform: rotateY(0deg) translateZ(580px);
            }

            .card:nth-child(2) {
                transform: rotateY(36deg) translateZ(580px);
            }

            .card:nth-child(3) {
                transform: rotateY(72deg) translateZ(580px);
            }

            .card:nth-child(4) {
                transform: rotateY(108deg) translateZ(580px);
            }

            .card:nth-child(5) {
                transform: rotateY(144deg) translateZ(580px);
            }

            .card:nth-child(6) {
                transform: rotateY(180deg) translateZ(580px);
            }

            .card:nth-child(7) {
                transform: rotateY(216deg) translateZ(580px);
            }

            .card:nth-child(8) {
                transform: rotateY(252deg) translateZ(580px);
            }

            .card:nth-child(9) {
                transform: rotateY(288deg) translateZ(580px);
            }

            .card:nth-child(10) {
                transform: rotateY(324deg) translateZ(580px);
            }
        }

        @media(max-width: 1024px) {
            .card:nth-child(1) {
                transform: rotateY(0deg) translateZ(480px);
            }

            .card:nth-child(2) {
                transform: rotateY(36deg) translateZ(480px);
            }

            .card:nth-child(3) {
                transform: rotateY(72deg) translateZ(480px);
            }

            .card:nth-child(4) {
                transform: rotateY(108deg) translateZ(480px);
            }

            .card:nth-child(5) {
                transform: rotateY(144deg) translateZ(480px);
            }

            .card:nth-child(6) {
                transform: rotateY(180deg) translateZ(480px);
            }

            .card:nth-child(7) {
                transform: rotateY(216deg) translateZ(480px);
            }

            .card:nth-child(8) {
                transform: rotateY(252deg) translateZ(480px);
            }

            .card:nth-child(9) {
                transform: rotateY(288deg) translateZ(480px);
            }

            .card:nth-child(10) {
                transform: rotateY(324deg) translateZ(480px);
            }

            .card {
                width: 260px;
                height: 400px;
                margin-left: -130px;
                margin-top: -200px;
            }

            .icon {
                font-size: 3.5rem;
                margin-bottom: 15px;
            }

            h3 {
                font-size: 1.3rem;
                margin-bottom: 10px;
            }

            p {
                font-size: 0.85rem;
            }

            .number {
                font-size: 6rem;
            }
        }

        @media(max-width: 768px) {
            body {
                overflow-y: auto;
                display: block;
                height: auto;
                padding: 12vh 0;
            }

            .cinema-bar {
                height: 5vh;
            }

            .intro-text {
                font-size: 1.8rem;
            }

            .scene {
                height: auto;
                perspective: none;
                transition: none;
            }

            .carousel {
                animation: none;
                transform: none;
                display: flex;
                flex-direction: column;
                gap: 40px;
                align-items: center;
                padding: 20px;
            }

            .card {
                position: relative;
                left: 0;
                top: 0;
                margin: 0;
                transform: none !important;
                width: 100%;
                max-width: 380px;
                height: auto;
                min-height: 400px;
            }

            .header {
                position: relative;
                top: 0;
                margin-bottom: 50px;
            }

            .header h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- Cinematic Intro -->
    <div class="intro-overlay">
        <div class="intro-text">Advanced Diploma in Computer Applications </div>
    </div>

    <!-- Cinematic Bars -->
    <div class="cinema-bar top"></div>
    <div class="cinema-bar bottom"></div>

    <!-- Background Elements -->
    <div id="particles-js"></div>
    <div class="ambient-light"></div>

    <div class="header">
        <h1>ADCA Course</h1>
        <p>Advanced Diploma in Computer Applications</p>
    </div>

    <div class="scene">
        <div class="carousel" id="carousel">
            <!-- Cards generated by JS -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const syllabus = [
            { id: 1, title: 'Computers Fundamental', icon: '💻', desc: 'Architecture, hardware, software, memory.' },
            { id: 2, title: 'Windows Basics', icon: '🪟', desc: 'Files, Notepad, Paint, WordPad.' },
            { id: 3, title: 'MS Word', icon: '📝', desc: 'Document drafting, formatting, page layouts.' },
            { id: 4, title: 'MS Excel', icon: '📊', desc: 'Data management, formulas, functions, pivot tables.' },
            { id: 5, title: 'MS PowerPoint', icon: '🎯', desc: 'Presentations, animations, transitions.' },
            { id: 6, title: 'HTML', icon: '🌐', desc: 'Web tags, elements, basic structure.' },
            { id: 7, title: 'Internet', icon: '🌍', desc: 'Browsers, emails, networking basics.' },
            { id: 8, title: 'Tally Prime', icon: '🧾', desc: 'Accounting, ledgers, inventory, GST.' },
            { id: 9, title: 'Video & Audio Editing', icon: '🎬', desc: 'Fundamentals of timeline editing and sound design.' },
            { id: 10, title: 'Photoshop Basics', icon: '🎨', desc: 'Image manipulation, layers, masks, and graphic design.' }
        ];

        const carousel = document.getElementById('carousel');

        syllabus.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="number">${item.id < 10 ? '0' + item.id : item.id}</div>
                    <div class="icon">${item.icon}</div>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                </div>
            `;
            carousel.appendChild(card);
        });

        // Cinematic Particles - Deep space dust with a crimson/magenta hue
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 150, "density": { "enable": true, "value_area": 900 } },
                "color": { "value": ["#ffffff", "#ff0055", "#ff7700"] },
                "shape": { "type": "circle" },
                "opacity": {
                    "value": 0.6,
                    "random": true,
                    "anim": { "enable": true, "speed": 0.5, "opacity_min": 0.1, "sync": false }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": { "enable": true, "speed": 1.5, "size_min": 0.1, "sync": false }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 120,
                    "color": "#ff0055",
                    "opacity": 0.15,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 0.6,
                    "direction": "none",
                    "random": true,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "window",
                "events": {
                    "onhover": { "enable": true, "mode": "bubble" },
                    "onclick": { "enable": true, "mode": "repulse" },
                    "resize": true
                },
                "modes": {
                    "bubble": { "distance": 200, "size": 6, "duration": 2, "opacity": 1, "speed": 3 },
                    "repulse": { "distance": 250, "duration": 0.4 }
                }
            },
            "retina_detect": true
        });

        // Subtle camera/scene movement on mouse move for depth effect
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 1024) {
                const x = (e.clientX / window.innerWidth - 0.5) * 15;
                const y = (e.clientY / window.innerHeight - 0.5) * 15;
                document.querySelector('.scene').style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
            }
        });
    </script>
</body>

</html>
